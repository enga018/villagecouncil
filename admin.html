<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Village Admin Dashboard</title>

  <!-- Supabase -->
  <script src="subdomain-context.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #111a2e;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
      flex: 1;
    }

    .tabs {
      margin-bottom: 15px;
    }

    .tabs button {
      margin-right: 10px;
      padding: 10px 15px;
      background: #4f7cff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .tabs button:hover {
      background: #3b66ff;
    }

    #moduleArea {
      background: #16213e;
      padding: 15px;
      border-radius: 8px;
      min-height: 200px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button.action {
      padding: 10px;
      background: #4f7cff;
      border: none;
      color: white;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>

<body>

<header>
  <div>Village Admin Dashboard</div>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- STATS -->
  <div class="grid">
    <div class="card">
      <h3>Properties</h3>
      <p id="totalProperties">0</p>
    </div>

    <div class="card">
      <h3>Families</h3>
      <p id="totalFamilies">0</p>
    </div>

    <div class="card">
      <h3>Pending Tax</h3>
      <p id="pendingTax">₹0</p>
    </div>
  </div>

  <!-- MODULE TABS -->
  <div class="tabs">
    <button onclick="showModule('property')">Property</button>
    <button onclick="showModule('family')">Family</button>
    <button onclick="showModule('tax')">Tax</button>
  </div>

  <!-- MODULE CONTENT -->
  <div id="moduleArea">Select a module</div>

</div>

<script>

  // =========================
  // AUTH GUARD
  // =========================
  async function checkAuth() {
    const { data } = await supabaseClient.auth.getUser();

    if (!data.user) {
      window.location.href = "login.html";
    }
  }

  checkAuth();

  // =========================
  // LOGOUT
  // =========================
  async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  }

  // =========================
  // MODULE SWITCHER
  // =========================
  function showModule(module) {
    const area = document.getElementById("moduleArea");

    if (module === "property") {
      area.innerHTML = `
        <h3>Property Module</h3>
        <input placeholder="House Number">
        <input placeholder="Location">
        <button class="action">Add Property</button>
      `;
    }

    if (module === "family") {
      area.innerHTML = `
        <h3>Family Module</h3>
        <input placeholder="Head Name">
        <input placeholder="Property ID">
        <button class="action">Add Family</button>
      `;
    }

    if (module === "tax") {
      area.innerHTML = `
        <h3>Tax Module</h3>
        <button class="action">Generate Tax</button>
        <button class="action">View Pending</button>
      `;
    }
  }

</script>
</body>
</html>
