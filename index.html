<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENGA Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
    }

    .login {
      background: #4f7cff;
      color: white;
    }

    .login:hover {
      background: #3b66ff;
    }

    .admin {
      background: transparent;
      border: 1px solid #4f7cff;
      color: white;
    }

    .admin:hover {
      background: #1a2a4a;
    }
  </style>
</head>

<body>

<h1>ENGA Platform</h1>
<p>Village Council Management System</p>

<button class="btn login" onclick="goLogin()">Login</button>
<button class="btn admin" onclick="goAdmin()">Admin</button>

<script>
function goLogin() {
  window.location.href = "/login.html";
}

function goAdmin() {
  window.location.href = "/admin.html";
}
</script>

</body>
</html>
