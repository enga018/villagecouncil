<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>enga.in</title>
  <script src="subdomain-context.js?v=7"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=7"></script>
</head>
<body>
<script>
window.addEventListener('load', async () => {
  const ready = await waitForSupabase();
  if (!ready || !supabaseClient?.auth?.getSession) {
    window.location.replace('login.html');
    return;
  }

  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) {
    window.location.replace('login.html');
    return;
  }

  const profileCtx = await getProfile();
  if (!profileCtx) {
    window.location.replace('login.html');
    return;
  }

  const role = profileCtx.profile?.role;
  const tenant = profileCtx.tenant;

  if (role === 'super_admin') {
    window.location.replace('dashboard.html');
  } else if (tenant?.subdomain) {
    window.location.replace(buildHandoffUrl(`https://${tenant.subdomain}.enga.in/dashboard.html`, data.session));
  } else {
    window.location.replace('login.html');
  }
});
</script>
</body>
</html>
