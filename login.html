<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — enga.in</title>
  <script src="subdomain-context.js?v=9"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=9"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Inline fallback — in case app.js is served from cache without this function
    if (typeof waitForSupabase === 'undefined') {
      function waitForSupabase() {
        return new Promise((resolve) => {
          const check = () => { if (window.supabaseClient) return resolve(); setTimeout(check, 50); };
          check();
        });
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">enga.in</h1>
      <p class="text-slate-400 text-sm mt-1">Village Council Management</p>
    </div>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
      <h2 class="text-lg font-semibold text-white mb-6">Sign In</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm text-slate-300 mb-1">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-1">Password</label>
          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
      </div>

      <button id="loginBtn" onclick="login()"
        class="mt-6 w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-lg transition-colors">
        Sign In
      </button>

      <p id="msg" class="mt-4 text-sm text-center text-slate-400 min-h-5"></p>

      <div class="mt-4 text-center">
        <a href="register.html" class="text-sm text-slate-400 hover:text-white transition-colors">New worker? Create an account</a>
      </div>
    </div>
  </div>

<script>
async function login() {
  const msg = document.getElementById("msg");
  const btn = document.getElementById("loginBtn");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    msg.textContent = "Please enter email and password.";
    msg.className = "mt-4 text-sm text-center text-red-400 min-h-5";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Signing in…";
  msg.textContent = "";

  try {
    await waitForSupabase();

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = error.message;
      msg.className = "mt-4 text-sm text-center text-red-400 min-h-5";
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }

    msg.textContent = "Login successful. Redirecting…";
    msg.className = "mt-4 text-sm text-center text-green-400 min-h-5";

    // Smart redirect based on user role and subdomain context
    setTimeout(async () => {
      try {
        const { data: profileData } = await supabaseClient
          .from('profiles')
          .select('role, tenant_id, tenant:tenants(subdomain)')
          .eq('id', data.user.id)
          .single();

        if (profileData && profileData.role !== 'super_admin' && profileData.tenant?.subdomain) {
          // Tenant user — redirect to their subdomain, carrying the session
          // over since it lives in this origin's localStorage only
          const currentHost = window.location.hostname;
          const targetHost = `${profileData.tenant.subdomain}.enga.in`;
          if (currentHost !== targetHost) {
            window.location.replace(buildHandoffUrl(`https://${targetHost}/dashboard.html?from=login`, data.session));
            return;
          }
        }
        // Super admin or already on correct subdomain
        window.location.replace("dashboard.html?from=login");
      } catch (err) {
        console.error('Profile lookup failed:', err);
        window.location.replace("dashboard.html?from=login");
      }
    }, 400);

  } catch (e) {
    msg.textContent = "System error: " + e.message;
    msg.className = "mt-4 text-sm text-center text-red-400 min-h-5";
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}

document.getElementById("email").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("password").focus(); });
document.getElementById("password").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });

window.addEventListener("load", async () => {
  // Break redirect loops — if we came from dashboard with error, don't auto-redirect
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('from') === 'dashboard') {
    console.log('Redirected from dashboard — skipping auto-redirect to break loop');
    return;
  }

  try {
    await waitForSupabase();
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) {
      // Already logged in — smart redirect
      const { data: profileData } = await supabaseClient
        .from('profiles')
        .select('role, tenant_id, tenant:tenants(subdomain)')
        .eq('id', data.session.user.id)
        .single();

      if (profileData && profileData.role !== 'super_admin' && profileData.tenant?.subdomain) {
        const currentHost = window.location.hostname;
        const targetHost = `${profileData.tenant.subdomain}.enga.in`;
        if (currentHost !== targetHost) {
          window.location.replace(buildHandoffUrl(`https://${targetHost}/dashboard.html?from=login`, data.session));
          return;
        }
      }
      window.location.replace("dashboard.html?from=login");
    }
  } catch (err) {
    console.error('Login bootstrap failed:', err);
  }
});
</script>
</body>
</html>
