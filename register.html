<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — enga.in</title>
  <script src="subdomain-context.js?v=6"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=6"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof waitForSupabase === 'undefined') {
      function waitForSupabase() {
        return new Promise((resolve) => {
          const check = () => { if (window.supabaseClient) return resolve(); setTimeout(check, 50); };
          check();
        });
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Create Account</h1>
      <p class="text-slate-400 text-sm mt-1">Your admin will assign your role after registration.</p>
    </div>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-slate-300 mb-1">Full Name</label>
          <input id="fullName" type="text" placeholder="Your full name"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-1">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-1">Phone</label>
          <input id="phone" type="tel" inputmode="numeric" placeholder="Mobile number"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm text-slate-300 mb-1">Password</label>
          <input id="password" type="password" placeholder="Min. 8 characters"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <button id="registerBtn" onclick="register()"
        class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">
        Create Account
      </button>

      <p id="msg" class="mt-4 text-sm text-center text-slate-400 min-h-5"></p>

      <div class="mt-4 text-center">
        <a href="login.html" class="text-sm text-slate-400 hover:text-white transition-colors">Already have an account? Sign in</a>
      </div>
    </div>
  </div>

<script>
async function register() {
  const btn = document.getElementById('registerBtn');
  const msg = document.getElementById('msg');
  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;

  if (!fullName) { setMsg('Enter your full name.', 'error'); return; }
  if (!email) { setMsg('Enter your email.', 'error'); return; }
  if (password.length < 8) { setMsg('Password must be at least 8 characters.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    await waitForSupabase();

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: fullName, phone, role: 'worker' }
      }
    });

    if (error) { setMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Create Account'; return; }

    // Update profile with phone if trigger created the row
    if (data.user) {
      await supabaseClient.from('profiles').upsert({
        id: data.user.id,
        full_name: fullName,
        phone,
        role: 'worker',
        status: 'active'
      }, { onConflict: 'id' });
    }

    setMsg('Account created! Your admin will assign your role. You can now sign in.', 'success');
    btn.textContent = 'Done';
    setTimeout(() => { window.location.href = 'login.html'; }, 2500);

  } catch (e) {
    setMsg('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

function setMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `mt-4 text-sm text-center min-h-5 ${type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-slate-400'}`;
}

window.addEventListener('load', async () => {
  await waitForSupabase();
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) window.location.href = 'index.html';
});
</script>
</body>
</html>
