<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — enga.in</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=3"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof waitForSupabase === 'undefined') {
      function waitForSupabase() {
        return new Promise((resolve) => {
          const check = () => { if (window.supabaseClient) return resolve(); setTimeout(check, 50); };
          check();
        });
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-100">

<!-- Header -->
<header class="bg-indigo-900 text-white shadow-lg">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-indigo-700 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <div>
        <div class="font-bold text-sm leading-none">enga.in</div>
        <div class="text-indigo-300 text-xs mt-0.5">Super Admin Panel</div>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-indigo-200 text-xs hidden sm:block" id="adminEmail"></span>
      <a href="index.html" class="text-indigo-200 hover:text-white text-sm transition-colors">Dashboard</a>
      <button onclick="logout()" class="text-indigo-200 hover:text-white text-sm transition-colors">Logout</button>
    </div>
  </div>
</header>

<!-- Stats Bar -->
<div class="bg-indigo-800 text-white">
  <div class="max-w-6xl mx-auto px-4 py-3 grid grid-cols-3 gap-4">
    <div class="text-center">
      <div class="text-xl font-bold" id="statVC">—</div>
      <div class="text-xs text-indigo-300">Village Councils</div>
    </div>
    <div class="text-center">
      <div class="text-xl font-bold" id="statUsers">—</div>
      <div class="text-xs text-indigo-300">Users</div>
    </div>
    <div class="text-center">
      <div class="text-xl font-bold" id="statProps">—</div>
      <div class="text-xs text-indigo-300">Properties</div>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-6xl mx-auto px-4">
    <nav class="flex gap-0">
      <button onclick="showTab('vc')" id="tab-vc"
        class="tab-btn px-5 py-4 text-sm font-medium border-b-2 border-indigo-600 text-indigo-700 transition-colors">
        Village Councils
      </button>
      <button onclick="showTab('users')" id="tab-users"
        class="tab-btn px-5 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">
        Users
      </button>
    </nav>
  </div>
</div>

<main class="max-w-6xl mx-auto px-4 py-6">

  <!-- ===== VILLAGE COUNCILS TAB ===== -->
  <div id="panel-vc">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-bold text-gray-900">Village Councils</h2>
      <button onclick="openVCModal(null)"
        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        New Village Council
      </button>
    </div>

    <div id="vcList" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
      <div class="col-span-full text-sm text-gray-400 text-center py-8">Loading…</div>
    </div>
  </div>

  <!-- ===== USERS TAB ===== -->
  <div id="panel-users" class="hidden">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-bold text-gray-900">Users</h2>
      <a href="register.html" target="_blank"
        class="border border-indigo-300 text-indigo-700 text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-indigo-50 transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
        Register New User
      </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Name</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide hidden sm:table-cell">Email</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Role</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide hidden md:table-cell">Village Council</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr><td colspan="5" class="text-center py-8 text-gray-400">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- ===== VILLAGE COUNCIL MODAL ===== -->
<div id="vcModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-xl">
    <div class="p-5 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-semibold text-gray-900" id="vcModalTitle">New Village Council</h3>
      <button onclick="closeVCModal()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <input type="hidden" id="vcEditId">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Village Council Name <span class="text-red-500">*</span></label>
        <input id="vcName" type="text" placeholder="e.g. New Serkawn Village Council"
          class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          oninput="autoFillSubdomain()">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Subdomain <span class="text-red-500">*</span></label>
        <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500">
          <input id="vcSubdomain" type="text" placeholder="newserkawn"
            class="flex-1 px-4 py-3 text-sm focus:outline-none font-mono lowercase"
            oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')">
          <span class="px-3 py-3 bg-gray-50 text-gray-400 text-sm border-l border-gray-200">.enga.in</span>
        </div>
      </div>

      <div id="vcModalError" class="hidden text-sm text-red-600"></div>
    </div>
    <div class="p-5 pt-0 flex gap-3">
      <button onclick="closeVCModal()" class="flex-1 border border-gray-200 text-gray-700 font-medium py-2.5 rounded-lg hover:bg-gray-50 text-sm">
        Cancel
      </button>
      <button onclick="saveVC()" id="vcSaveBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
        Create
      </button>
    </div>
  </div>
</div>

<!-- ===== USER EDIT MODAL ===== -->
<div id="userModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-sm shadow-xl">
    <div class="p-5 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-semibold text-gray-900">Edit User</h3>
      <button onclick="closeUserModal()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <input type="hidden" id="editUserId">

      <div>
        <p class="text-sm font-medium text-gray-900" id="editUserName"></p>
        <p class="text-xs text-gray-400" id="editUserEmail"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Role <span class="text-red-500">*</span></label>
        <select id="editUserRole"
          class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <option value="worker">Worker</option>
          <option value="admin">Admin</option>
          <option value="super_admin">Super Admin</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Village Council</label>
        <select id="editUserTenant"
          class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <option value="">— Unassigned —</option>
        </select>
      </div>

      <div id="userModalError" class="hidden text-sm text-red-600"></div>
    </div>
    <div class="p-5 pt-0 flex gap-3">
      <button onclick="closeUserModal()" class="flex-1 border border-gray-200 text-gray-700 font-medium py-2.5 rounded-lg hover:bg-gray-50 text-sm">
        Cancel
      </button>
      <button onclick="saveUser()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
        Save
      </button>
    </div>
  </div>
</div>


<script>
// ─── Cache ────────────────────────────────────────────────────────────
let allTenants = [];
let allUsers = [];
let currentTab = 'vc';

// ─── Init ─────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await waitForSupabase();

  const user = await requireAuth();
  if (!user) return;

  // Verify super admin role
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('role, full_name')
    .eq('id', user.id)
    .single();

  if (!profile || profile.role !== 'super_admin') {
    document.body.innerHTML = `
      <div class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white rounded-2xl p-8 text-center shadow max-w-sm">
          <div class="text-4xl mb-3">🚫</div>
          <h2 class="font-bold text-gray-900 mb-2">Access Denied</h2>
          <p class="text-gray-500 text-sm mb-4">This panel requires Super Admin access.</p>
          <a href="index.html" class="text-indigo-600 text-sm hover:underline">Back to Dashboard</a>
        </div>
      </div>`;
    return;
  }

  document.getElementById('adminEmail').textContent = user.email;

  await Promise.all([loadStats(), loadVillageCouncils()]);
});

// ─── Tabs ─────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  ['vc', 'users'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    if (t === tab) {
      btn.className = 'tab-btn px-5 py-4 text-sm font-medium border-b-2 border-indigo-600 text-indigo-700 transition-colors';
    } else {
      btn.className = 'tab-btn px-5 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
    }
  });

  if (tab === 'users' && allUsers.length === 0) loadUsers();
}

// ─── Stats ────────────────────────────────────────────────────────────
async function loadStats() {
  const [vcRes, usersRes, propsRes] = await Promise.all([
    supabaseClient.from('tenants').select('id', { count: 'exact', head: true }),
    supabaseClient.from('profiles').select('id', { count: 'exact', head: true }),
    supabaseClient.from('properties').select('id', { count: 'exact', head: true })
  ]);
  document.getElementById('statVC').textContent = vcRes.count ?? '—';
  document.getElementById('statUsers').textContent = usersRes.count ?? '—';
  document.getElementById('statProps').textContent = propsRes.count ?? '—';
}

// ─── Village Councils ─────────────────────────────────────────────────
async function loadVillageCouncils() {
  const { data, error } = await supabaseClient
    .from('tenants')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('vcList').innerHTML = `<div class="col-span-full text-sm text-red-500">Error: ${error.message}</div>`;
    return;
  }

  allTenants = data || [];
  renderVCList();
}

function renderVCList() {
  const list = document.getElementById('vcList');
  if (allTenants.length === 0) {
    list.innerHTML = `
      <div class="col-span-full bg-white rounded-xl border-2 border-dashed border-gray-200 p-10 text-center">
        <p class="text-gray-400 text-sm mb-3">No village councils yet.</p>
        <button onclick="openVCModal(null)" class="text-indigo-600 text-sm font-medium hover:underline">Create the first one →</button>
      </div>`;
    return;
  }

  list.innerHTML = allTenants.map(vc => `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex flex-col gap-3">
      <div class="flex items-start justify-between gap-2">
        <div>
          <h3 class="font-semibold text-gray-900 text-sm leading-tight">${vc.name}</h3>
          <p class="text-xs text-gray-400 mt-0.5 font-mono">${vc.subdomain}.enga.in</p>
        </div>
        <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full font-medium flex-shrink-0">Active</span>
      </div>
      <div class="flex gap-2 pt-1 border-t border-gray-50">
        <button onclick="openVCModal('${vc.id}')"
          class="flex-1 text-xs text-indigo-600 font-medium py-1.5 rounded hover:bg-indigo-50 transition-colors">
          Edit
        </button>
        <button onclick="copyTenantId('${vc.id}')"
          class="flex-1 text-xs text-gray-500 font-medium py-1.5 rounded hover:bg-gray-50 transition-colors">
          Copy ID
        </button>
      </div>
    </div>
  `).join('');
}

function openVCModal(id) {
  document.getElementById('vcEditId').value = id || '';
  document.getElementById('vcModalError').classList.add('hidden');
  document.getElementById('vcSaveBtn').textContent = id ? 'Save Changes' : 'Create';
  document.getElementById('vcModalTitle').textContent = id ? 'Edit Village Council' : 'New Village Council';

  if (id) {
    const vc = allTenants.find(t => t.id === id);
    document.getElementById('vcName').value = vc?.name || '';
    document.getElementById('vcSubdomain').value = vc?.subdomain || '';
  } else {
    document.getElementById('vcName').value = '';
    document.getElementById('vcSubdomain').value = '';
  }

  document.getElementById('vcModal').classList.remove('hidden');
  document.getElementById('vcModal').classList.add('flex');
}

function closeVCModal() {
  document.getElementById('vcModal').classList.add('hidden');
  document.getElementById('vcModal').classList.remove('flex');
}

function autoFillSubdomain() {
  const name = document.getElementById('vcName').value;
  const sub = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  document.getElementById('vcSubdomain').value = sub;
}

async function saveVC() {
  const errEl = document.getElementById('vcModalError');
  errEl.classList.add('hidden');

  const editId = document.getElementById('vcEditId').value;
  const name = document.getElementById('vcName').value.trim();
  const subdomain = document.getElementById('vcSubdomain').value.trim();

  if (!name) { showVCError('Enter village council name.'); return; }
  if (!subdomain) { showVCError('Enter subdomain.'); return; }

  const btn = document.getElementById('vcSaveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    if (editId) {
      const { error: e1 } = await supabaseClient.from('tenants').update({ name, subdomain }).eq('id', editId);
      if (e1) throw e1;
      const { error: e2 } = await supabaseClient.from('village_councils').update({ name, subdomain }).eq('id', editId);
      if (e2 && e2.code !== 'PGRST116') throw e2;
    } else {
      // Same UUID in both tables so tenant_id == village_council_id
      const newId = crypto.randomUUID();
      const { error: e1 } = await supabaseClient.from('tenants').insert({ id: newId, name, subdomain });
      if (e1) throw e1;
      const { error: e2 } = await supabaseClient.from('village_councils').insert({ id: newId, name, subdomain, status: 'active' });
      if (e2) throw e2;
    }

    closeVCModal();
    await Promise.all([loadVillageCouncils(), loadStats()]);
  } catch (err) {
    showVCError(err.message || 'Save failed.');
  }

  btn.disabled = false;
  btn.textContent = editId ? 'Save Changes' : 'Create';
}

function showVCError(msg) {
  const el = document.getElementById('vcModalError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function copyTenantId(id) {
  navigator.clipboard.writeText(id).then(() => showToast('Tenant ID copied'));
}

// ─── Users ────────────────────────────────────────────────────────────
async function loadUsers() {
  const { data, error } = await supabaseClient
    .from('profiles')
    .select('id, full_name, role, status, tenant_id, phone, created_at')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('userTableBody').innerHTML = `<tr><td colspan="5" class="text-center py-6 text-red-500">Error: ${error.message}</td></tr>`;
    return;
  }

  allUsers = data || [];
  renderUserTable();
}

function renderUserTable() {
  const roleColors = {
    super_admin: 'bg-purple-100 text-purple-700',
    admin: 'bg-blue-100 text-blue-700',
    worker: 'bg-gray-100 text-gray-600'
  };
  const roleLabels = { super_admin: 'Super Admin', admin: 'Admin', worker: 'Worker' };

  const body = document.getElementById('userTableBody');
  if (allUsers.length === 0) {
    body.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-400 text-sm">No users yet. <a href="register.html" target="_blank" class="text-indigo-600 hover:underline">Register the first user →</a></td></tr>`;
    return;
  }

  body.innerHTML = allUsers.map(u => {
    const tenant = allTenants.find(t => t.id === u.tenant_id);
    return `
      <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
        <td class="px-4 py-3">
          <div class="font-medium text-gray-900 text-sm">${u.full_name || '—'}</div>
          <div class="text-xs text-gray-400 sm:hidden">${u.phone || ''}</div>
        </td>
        <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">${u.phone || '—'}</td>
        <td class="px-4 py-3">
          <span class="text-xs px-2 py-1 rounded-full font-medium ${roleColors[u.role] || 'bg-gray-100 text-gray-600'}">
            ${roleLabels[u.role] || u.role || 'Unset'}
          </span>
        </td>
        <td class="px-4 py-3 text-sm text-gray-500 hidden md:table-cell">${tenant?.name || '—'}</td>
        <td class="px-4 py-3 text-right">
          <button onclick="openUserModal('${u.id}')"
            class="text-xs text-indigo-600 font-medium hover:underline">Edit</button>
        </td>
      </tr>
    `;
  }).join('');
}

function openUserModal(userId) {
  const u = allUsers.find(x => x.id === userId);
  if (!u) return;

  document.getElementById('editUserId').value = userId;
  document.getElementById('editUserName').textContent = u.full_name || '(no name)';
  document.getElementById('editUserEmail').textContent = u.phone || userId;
  document.getElementById('editUserRole').value = u.role || 'worker';
  document.getElementById('userModalError').classList.add('hidden');

  // Populate tenant select
  const sel = document.getElementById('editUserTenant');
  sel.innerHTML = '<option value="">— Unassigned —</option>' +
    allTenants.map(t => `<option value="${t.id}" ${u.tenant_id === t.id ? 'selected' : ''}>${t.name}</option>`).join('');

  document.getElementById('userModal').classList.remove('hidden');
  document.getElementById('userModal').classList.add('flex');
}

function closeUserModal() {
  document.getElementById('userModal').classList.add('hidden');
  document.getElementById('userModal').classList.remove('flex');
}

async function saveUser() {
  const id = document.getElementById('editUserId').value;
  const role = document.getElementById('editUserRole').value;
  const tenantId = document.getElementById('editUserTenant').value || null;

  const { error } = await supabaseClient
    .from('profiles')
    .update({ role, tenant_id: tenantId })
    .eq('id', id);

  if (error) {
    document.getElementById('userModalError').textContent = error.message;
    document.getElementById('userModalError').classList.remove('hidden');
    return;
  }

  closeUserModal();
  await loadUsers();
}

// ─── Toast ────────────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toastEl');
  if (!t) { t = document.createElement('div'); t.id = 'toastEl'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-gray-800 text-white px-4 py-2.5 rounded-lg text-sm font-medium shadow-lg';
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.display = 'none'; }, 2500);
}
</script>
</body>
</html>
